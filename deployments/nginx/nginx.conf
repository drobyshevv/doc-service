server {
    listen 80;
    server_name localhost;

    # 1. API: Auth-сервис
    location /auth/ {
        proxy_pass http://docservice-auth:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. API: Поиск СО СЛЭШЕМ (например, /search/?query=...)
    location /search/ {
        proxy_pass http://docservice-mainserv:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 3. ТОЧНОЕ СОВПАДЕНИЕ /search (без слэша) — ОТДАЁМ REACT-СТРАНИЦУ!
    location = /search {
        root /usr/share/nginx/html;
        index index.html;
        try_files /index.html =404;
    }

    # 4. API: Документы
    location /documents/ {
        proxy_pass http://docservice-mainserv:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 5. API: Публичные документы
    location /public/documents {
        proxy_pass http://docservice-mainserv:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. Health check
    location /health {
        proxy_pass http://docservice-mainserv:8081/health;
        access_log off;
    }

    # 7. React-статика и роутинг (всё остальное)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 8. Статические ассеты
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}