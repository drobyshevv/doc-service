services:
  postgres:
    image: postgres:16
    container_name: docservice-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mainserv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
      image: minio/minio
      container_name: docservice-minio
      restart: always
      command: server /data --console-address ":9001"
      environment:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
      ports:
        - "9000:9000"
        - "9001:9001"
      volumes:
        - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/documents || true
      "

  migrator:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-migrator
    depends_on:
      - postgres
    volumes:
      - .:/app
    working_dir: /app
    command: go run cmd/mainserv/migrator/main.go up

  mainserv:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-mainserv
    restart: always
    depends_on:
      - postgres
      - minio
      - migrator
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    working_dir: /app
    command: go run cmd/mainserv/server/main.go

volumes:
  postgres_data:
  minio_data: