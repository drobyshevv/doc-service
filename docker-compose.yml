services:

  postgres-auth:
    image: postgres:16
    container_name: docservice-postgres-auth
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  postgres-main:
    image: postgres:16
    container_name: docservice-postgres-main
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mainserv_db
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7
    container_name: docservice-redis
    restart: always
    networks:
      - backend

  minio:
    image: minio/minio
    container_name: docservice-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"  
    volumes:
      - minio_data:/data
    networks:
      - backend

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/documents || true
      "
    networks:
      - backend


  auth-migrator:
    build:
      context: .
      dockerfile: deployments/docker/auth.Dockerfile
    container_name: docservice-auth-migrator
    depends_on:
      postgres-auth:
        condition: service_healthy
    command: ["./auth-migrator", "up"]
    restart: "no"
    networks:
      - backend

  main-migrator:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-main-migrator
    depends_on:
      postgres-main:
        condition: service_healthy
      auth-migrator:
        condition: service_completed_successfully
    command: ["./mainserv-migrator", "up"]
    restart: "no"
    networks:
      - backend


  auth:
    build:
      context: .
      dockerfile: deployments/docker/auth.Dockerfile
    container_name: docservice-auth
    restart: always
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
      auth-migrator:
        condition: service_completed_successfully
    expose:
      - "8082" 
    networks:
      - backend

  mainserv:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-mainserv
    restart: always
    ports:
      - "8081:8081" 
    depends_on:
      postgres-main:
        condition: service_healthy
      minio:
        condition: service_started
      main-migrator:
        condition: service_completed_successfully
    expose:
      - "8081" 
    networks:
      - backend


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docservice-frontend
    restart: always

    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - backend


  nginx:
    image: nginx:alpine
    container_name: docservice-nginx
    restart: always
    ports:
      - "80:80"  
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro  
    depends_on:
      - auth
      - mainserv
      - frontend
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_main_data:
  minio_data: