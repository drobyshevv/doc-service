services:

  postgres-auth:
    image: postgres:16
    container_name: docservice-postgres-auth
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-main:
    image: postgres:16
    container_name: docservice-postgres-main
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mainserv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: docservice-redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: docservice-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/documents || true
      "

  auth-migrator:
    build:
      context: .
      dockerfile: deployments/docker/auth.Dockerfile
    container_name: docservice-auth-migrator
    depends_on:
      postgres-auth:
        condition: service_healthy
    command: ["./auth-migrator", "up"]
    restart: "no"


  main-migrator:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-main-migrator
    depends_on:
      postgres-main:
        condition: service_healthy
      auth-migrator:
        condition: service_completed_successfully
    command: ["./mainserv-migrator", "up"]
    restart: "no"


  auth:
    build:
      context: .
      dockerfile: deployments/docker/auth.Dockerfile
    container_name: docservice-auth
    restart: always
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
      auth-migrator:
        condition: service_completed_successfully
    ports:
      - "8082:8082"


  mainserv:
    build:
      context: .
      dockerfile: deployments/docker/mainserv.Dockerfile
    container_name: docservice-mainserv
    restart: always
    depends_on:
      postgres-main:
        condition: service_healthy
      minio:
        condition: service_started
      main-migrator:
        condition: service_completed_successfully
    ports:
      - "8081:8081"

  gateway:
    build:
      context: .
      dockerfile: deployments/docker/gateway.Dockerfile
    container_name: docservice-gateway
    restart: always
    depends_on:
      auth:
        condition: service_started
      mainserv:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres_auth_data:
  postgres_main_data:
  minio_data: